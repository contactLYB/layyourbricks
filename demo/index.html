function NeighborhoodView({ onSelectVertical }) {
  const scrollRef = useRef(null);
  const [hoveredVert, setHoveredVert] = useState(null);
  const [carPos, setCarPos] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const dragStart = useRef(null);
  const dragCarStart = useRef(null);

  const STREET_W = VERTICALS.length * 170 + 100;
  const VISIBLE_W = typeof window !== "undefined" ? Math.min(window.innerWidth, 1100) : 900;
  const maxScroll = Math.max(0, STREET_W - VISIBLE_W + 48);
  const roadW = VISIBLE_W - 48;

  const scrollTo = useCallback((pos) => {
    const clamped = Math.max(0, Math.min(maxScroll, pos));
    setCarPos(clamped);
    if (scrollRef.current) scrollRef.current.scrollLeft = clamped;
  }, [maxScroll]);

  const handleMouseDown = (e) => {
    e.preventDefault();
    setIsDragging(true);
    dragStart.current = e.clientX || e.touches?.[0]?.clientX;
    dragCarStart.current = carPos;
  };

  useEffect(() => {
    const handleMouseMove = (e) => {
      if (!isDragging || dragStart.current === null) return;
      const clientX = e.clientX || e.touches?.[0]?.clientX;
      const delta = clientX - dragStart.current;
      const scrollRatio = maxScroll / Math.max(1, roadW - 72);
      scrollTo(dragCarStart.current + delta * scrollRatio);
    };
    const handleMouseUp = () => setIsDragging(false);
    if (isDragging) {
      window.addEventListener("mousemove", handleMouseMove);
      window.addEventListener("mouseup", handleMouseUp);
      window.addEventListener("touchmove", handleMouseMove);
      window.addEventListener("touchend", handleMouseUp);
    }
    return () => {
      window.removeEventListener("mousemove", handleMouseMove);
      window.removeEventListener("mouseup", handleMouseUp);
      window.removeEventListener("touchmove", handleMouseMove);
      window.removeEventListener("touchend", handleMouseUp);
    };
  }, [isDragging, carPos, maxScroll, roadW, scrollTo]);

  const handleScroll = () => {
    if (!isDragging && scrollRef.current) setCarPos(scrollRef.current.scrollLeft);
  };

  const carLeft = maxScroll > 0 ? (carPos / maxScroll) * Math.max(0, roadW - 72) : 0;

  return (
    <div style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 24px 0" }}>
      <div className="fade-up" style={{ textAlign: "center", marginBottom: 28 }}>
        <h1 className="serif" style={{ fontSize: 34, lineHeight: 1.2, marginBottom: 10 }}>Explore Your Block</h1>
        <p style={{ color: T.warmGray, fontSize: 15, maxWidth: 520, margin: "0 auto", lineHeight: 1.6 }}>
          Click on a building to discover businesses in that category. Drag the car to cruise down the street.
        </p>
      </div>

      <div className="fade-up" style={{
        animationDelay: "0.1s", animationFillMode: "backwards",
        background: "linear-gradient(180deg, #B8D4E8 0%, #D4E4F0 40%, #E8EEF4 100%)",
        borderRadius: "16px 16px 0 0", overflow: "hidden", position: "relative",
      }}>
        <div style={{ position: "absolute", top: 18, left: "15%", width: 80, height: 24, borderRadius: 12, background: "rgba(255,255,255,0.7)" }} />
        <div style={{ position: "absolute", top: 28, left: "16%", width: 50, height: 18, borderRadius: 9, background: "rgba(255,255,255,0.7)" }} />
        <div style={{ position: "absolute", top: 12, right: "20%", width: 100, height: 28, borderRadius: 14, background: "rgba(255,255,255,0.6)" }} />
        <div style={{ position: "absolute", top: 22, right: "18%", width: 60, height: 20, borderRadius: 10, background: "rgba(255,255,255,0.6)" }} />

        <div ref={scrollRef} onScroll={handleScroll} className="street-scene" style={{ overflowX: "auto", overflowY: "hidden", scrollBehavior: isDragging ? "auto" : "smooth", paddingTop: 40 }}>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 28, paddingLeft: 40, paddingRight: 40, width: STREET_W, minHeight: 260 }}>
            {VERTICALS.map((v) => (
              <Building key={v.id} vert={v} isHovered={hoveredVert === v.id}
                onHover={() => setHoveredVert(v.id)} onLeave={() => setHoveredVert(null)}
                onClick={() => onSelectVertical(v)} />
            ))}
          </div>
        </div>
        <div style={{ height: 18, background: "#D4C8B8", borderTop: "2px solid #C4B8A8" }} />
      </div>

      <div style={{ background: "#555", borderRadius: "0 0 16px 16px", padding: "10px 24px 14px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: 2, display: "flex", justifyContent: "space-around", transform: "translateY(-1px)" }}>
          {Array.from({ length: 20 }).map((_, i) => <div key={i} style={{ width: 30, height: 2, background: "#FFD54F", opacity: 0.6 }} />)}
        </div>
        <div onMouseDown={handleMouseDown} onTouchStart={handleMouseDown} style={{
          position: "relative", left: carLeft, width: 72,
          cursor: isDragging ? "grabbing" : "grab",
          animation: !isDragging ? "carBounce 2s ease-in-out infinite" : "none",
          userSelect: "none", transition: isDragging ? "none" : "left 0.15s ease-out", zIndex: 2,
        }}>
          <CarSVG />
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: 12, marginBottom: 8 }}>
        <span style={{ fontSize: 12, color: T.warmGray }}>← Drag the car or scroll to see more →</span>
      </div>
    </div>
  );
}

// ─── FILTERED BROWSE VIEW ───
function VerticalBrowseView({ vertical, businesses, onSelect, onBack }) {
  const [sortBy, setSortBy] = useState("newest");
  const filtered = businesses.filter(b => b.vertical === vertical.id);
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "newest") return a.createdAt - b.createdAt;
    if (sortBy === "oldest") return b.createdAt - a.createdAt;
    if (sortBy === "highRate") return b.rate - a.rate;
    if (sortBy === "lowRate") return a.rate - b.rate;
    if (sortBy === "closestFund") return pct(b.raised, b.ask) - pct(a.raised, a.ask);
    if (sortBy === "mostInvestors") return b.investors - a.investors;
    return 0;
  });
  const sortOptions = [
    { key: "newest", label: "Newest" }, { key: "oldest", label: "Oldest" },
    { key: "highRate", label: "Highest Interest" }, { key: "lowRate", label: "Lowest Interest" },
    { key: "closestFund", label: "Closest to Funded" }, { key: "mostInvestors", label: "Most Investors" },
  ];

  return (
    <div style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 24px" }}>
      <button onClick={onBack} className="fade-in" style={{ display: "flex", alignItems: "center", gap: 6, background: "none", color: T.warmGray, fontSize: 13, fontWeight: 500, marginBottom: 20, padding: 0, transition: "color 0.2s" }}
        onMouseEnter={e => e.target.style.color = T.terracotta} onMouseLeave={e => e.target.style.color = T.warmGray}>
        ← Back to Explore
      </button>
      <div className="fade-up" style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
        <div style={{ width: 44, height: 44, borderRadius: 10, background: vertical.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{vertical.icon}</div>
        <div>
          <h1 className="serif" style={{ fontSize: 26 }}>{vertical.label}</h1>
          <p style={{ fontSize: 13, color: T.warmGray }}>{sorted.length} business{sorted.length !== 1 ? "es" : ""} seeking community investment</p>
        </div>
      </div>
      <div className="fade-up" style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 24, flexWrap: "wrap", animationDelay: "0.05s", animationFillMode: "backwards" }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: T.warmGray, marginRight: 4 }}>Sort by:</span>
        {sortOptions.map(s => (
          <button key={s.key} onClick={() => setSortBy(s.key)} style={{
            padding: "6px 14px", borderRadius: 20, fontSize: 12, fontWeight: sortBy === s.key ? 600 : 400,
            color: sortBy === s.key ? T.cream : T.charcoal, background: sortBy === s.key ? vertical.color : T.white,
            border: `1px solid ${sortBy === s.key ? vertical.color : T.lightBorder}`, transition: "all 0.2s",
          }}>{s.label}</button>
        ))}
      </div>
      {sorted.length === 0 ? (
        <div className="fade-up" style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.lightBorder}`, padding: "48px 32px", textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>{vertical.icon}</div>
          <h3 className="serif" style={{ fontSize: 20, marginBottom: 8 }}>No listings yet</h3>
          <p style={{ color: T.warmGray, fontSize: 14, maxWidth: 360, margin: "0 auto", lineHeight: 1.6 }}>
            We're actively recruiting {vertical.label.toLowerCase()} businesses in Baltimore. Know a business that should be here? Let us know.
          </p>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 20 }}>
          {sorted.map((biz, i) => (
            <div key={biz.id} className="fade-up" style={{
              animationDelay: `${i * 0.08}s`, animationFillMode: "backwards",
              background: T.white, borderRadius: 12, border: `1px solid ${T.lightBorder}`, overflow: "hidden", cursor: "pointer", transition: "transform 0.2s, box-shadow 0.2s",
            }}
              onClick={() => onSelect(biz)}
              onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(44,36,32,0.1)"; }}
              onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}>
              <div style={{ height: 6, background: biz.funded ? T.sage : vertical.color }} />
              <div style={{ padding: "20px 22px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div>
                    <h3 className="serif" style={{ fontSize: 19, marginBottom: 2 }}>{biz.name}</h3>
                    <p style={{ fontSize: 13, color: T.warmGray }}>{biz.type}</p>
                  </div>
                  {biz.funded ? <Tag color={T.sage} bg="#E8F5E9">Funded</Tag> : <Tag color={T.terracotta} bg="#FDEEE9">{biz.daysLeft}d left</Tag>}
                </div>
                <p style={{ fontSize: 12, color: T.warmGray, marginBottom: 14 }}>
                  <span style={{ fontWeight: 600, color: T.charcoal }}>{biz.neighborhood}</span> &middot; Owned by {biz.owner}
                </p>
                <p style={{ fontSize: 13, color: T.charcoal, lineHeight: 1.5, marginBottom: 16, minHeight: 40 }}>
                  {biz.purpose.length > 100 ? biz.purpose.slice(0, 100) + "…" : biz.purpose}
                </p>
                <ProgressBar value={pct(biz.raised, biz.ask)} />
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 13 }}>
                  <span><strong>{fmt(biz.raised)}</strong> <span style={{ color: T.warmGray }}>of {fmt(biz.ask)}</span></span>
                  <span style={{ color: T.warmGray }}>{biz.investors} investors</span>
                </div>
                <div style={{ display: "flex", gap: 16, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.lightBorder}`, fontSize: 12, color: T.warmGray }}>
                  <span><strong style={{ color: T.charcoal }}>{biz.rate}%</strong> interest</span>
                  <span><strong style={{ color: T.charcoal }}>{biz.term}</strong> mo. term</span>
                  <span><strong style={{ color: T.charcoal }}>{biz.yearsInBusiness}</strong> yrs in business</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── C.I.E. VIEW ───
function CIEView() {
  const [activeModule, setActiveModule] = useState(null);
  const completedCount = CIE_MODULES.filter(m => m.completed).length;
  return (
    <div style={{ maxWidth: 760, margin: "0 auto", padding: "32px 24px" }}>
      <div className="fade-up" style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
          <h1 className="serif" style={{ fontSize: 28 }}>C.I.E. Learning Center</h1>
          <Tag color={T.gold} bg="#FFF8E8">Community Investor Education</Tag>
        </div>
        <p style={{ color: T.warmGray, fontSize: 14, lineHeight: 1.6, maxWidth: 560 }}>Before you invest, understand how community lending works. Complete these modules at your own pace to become a confident, informed community investor.</p>
      </div>
      <div className="fade-up" style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.lightBorder}`, padding: "20px 24px", marginBottom: 24, animationDelay: "0.1s", animationFillMode: "backwards" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>{completedCount} of {CIE_MODULES.length} modules completed</span>
          <span style={{ fontSize: 13, color: T.warmGray }}>{Math.round((completedCount / CIE_MODULES.length) * 100)}%</span>
        </div>
        <ProgressBar value={(completedCount / CIE_MODULES.length) * 100} height={8} color={T.gold} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {CIE_MODULES.map((mod, i) => (
          <div key={mod.id} className="fade-up" style={{ animationDelay: `${0.15 + i * 0.06}s`, animationFillMode: "backwards", background: T.white, borderRadius: 12, border: `1px solid ${activeModule === mod.id ? T.gold : T.lightBorder}`, overflow: "hidden", transition: "border-color 0.2s" }}>
            <div onClick={() => setActiveModule(activeModule === mod.id ? null : mod.id)} style={{ padding: "18px 22px", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: mod.completed ? "#E8F5E9" : T.cream, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                {mod.completed ? <CheckCircle color={T.sage} /> : <span style={{ fontSize: 14, fontWeight: 700, color: T.warmGray }}>{mod.id}</span>}
              </div>
              <div style={{ flex: 1 }}>
                <h4 style={{ fontSize: 15, fontWeight: 600, marginBottom: 2 }}>{mod.title}</h4>
                <p style={{ fontSize: 12, color: T.warmGray }}>{mod.desc}</p>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                <span style={{ fontSize: 11, color: T.warmGray }}>{mod.duration}</span>
                <div style={{ transform: activeModule === mod.id ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s", color: T.warmGray }}><ChevronRight /></div>
              </div>
            </div>
            {activeModule === mod.id && (
              <div className="fade-in" style={{ padding: "0 22px 22px", borderTop: `1px solid ${T.lightBorder}` }}>
                <div style={{ paddingTop: 18 }}>
                  <p style={{ fontSize: 14, lineHeight: 1.7, color: T.charcoal, marginBottom: 16 }}>
                    {mod.id === 1 && "Community lending lets you earn a return by lending directly to businesses in your neighborhood. Unlike stocks or mutual funds, you can see exactly where your money goes. When you invest through Lay Your Bricks, you're making a fixed-rate loan that gets paid back with interest over a set period of time."}
                    {mod.id === 2 && "Every investment carries risk. With community lending, the main risk is that a business may not be able to repay the full loan. Interest rates (typically 5-10%) reflect this risk. Longer terms and higher loan amounts generally carry higher rates. Diversifying across multiple businesses helps reduce your exposure to any single outcome."}
                    {mod.id === 3 && "A strong business profile shows clear revenue history, a specific use of funds, realistic repayment capacity, and community roots. Look for businesses with at least 2 years of operating history, monthly revenue that comfortably covers loan payments, and a clear explanation of how the funds will generate growth."}
                    {mod.id === 4 && "Even at $50 per investment, you can spread your portfolio across multiple businesses and sectors. A good starting strategy: invest in 3-5 different businesses across different neighborhoods and industries. This way, the success of your portfolio doesn't depend on any single business."}
                    {mod.id === 5 && "As a community investor, you have the right to receive regular updates on your loan's status, see repayment schedules, and access platform-level reporting. If a business faces difficulty, the platform works with borrowers on restructuring plans before any default action is taken."}
                  </p>
                  <button style={{ padding: "10px 20px", borderRadius: 8, fontSize: 13, fontWeight: 600, background: mod.completed ? T.cream : T.terracotta, color: mod.completed ? T.charcoal : T.cream, border: mod.completed ? `1px solid ${T.lightBorder}` : "none" }}>
                    {mod.completed ? "Review Again" : "Mark as Complete"}
                  </button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ROOT ───
function App() {
  const [view, setView] = useState("explore");
  const [selectedBiz, setSelectedBiz] = useState(null);
  const [selectedVertical, setSelectedVertical] = useState(null);
  const [popupVertical, setPopupVertical] = useState(null);

  useEffect(() => { window.scrollTo({ top: 0, behavior: "smooth" }); }, [view, selectedBiz, selectedVertical]);

  return (
    <>
      <style>{baseStyles}</style>
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
        <Topbar view={view} setView={setView} setSelectedBiz={setSelectedBiz} setSelectedVertical={setSelectedVertical} />
        <div style={{ flex: 1 }}>
          {view === "explore" && !selectedVertical && !selectedBiz && (
            <NeighborhoodView onSelectVertical={(v) => setPopupVertical(v)} />
          )}
          {view === "explore" && selectedVertical && !selectedBiz && (
            <VerticalBrowseView vertical={selectedVertical} businesses={BUSINESSES} onSelect={setSelectedBiz} onBack={() => setSelectedVertical(null)} />
          )}
          {view === "explore" && selectedBiz && (
            <BusinessDetail biz={selectedBiz} onBack={() => setSelectedBiz(null)} />
          )}
          {view === "dashboard" && <DashboardView />}
          {view === "apply" && <ApplyView />}
          {view === "learn" && <CIEView />}
        </div>
        <Footer />
        {popupVertical && (
          <VerticalPopup vertical={popupVertical} onClose={() => setPopupVertical(null)}
            onViewAll={() => { setSelectedVertical(popupVertical); setPopupVertical(null); }} />
        )}
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
